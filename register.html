<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #59bdbd;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-box {
        width: 350px;
        background: white;
        padding: 30px;
        border-radius: 10px;
        border: 5px solid blue;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        animation: vien 2s infinite;
      }

      .login-box h2 {
        text-align: center;
        margin-bottom: 25px;
        animation: colortext 2s infinite;
      }

      .input-group {
        margin-bottom: 18px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
      }

      .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #bd820c;
        animation: zoom 1s forwards;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
      }

      .footer a {
        text-decoration: none;
        color: #007bff;
      }

      .footer a:hover {
        text-decoration: underline;
      }
      @keyframes vien {
        0% {
          border-color: #0056b3;
        }
        20% {
          border-color: red;
        }
        40% {
          border-color: yellow;
        }
        60% {
          border-color: #59bdbd;
        }
        80% {
          border-color: blueviolet;
        }
        100% {
          border-color: #48d315;
        }
      }
      @keyframes zoom {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scaleX(1.01);
        }
      }
      @keyframes colortext {
        0% {
          color: #f80b0b;
        }
        20% {
          color: #48d315;
        }
        40% {
          color: #bd820c;
        }
        60% {
          color: #2dabce;
        }
        100% {
          color: #0056b3;
        }
      }
    </style>
  </head>
  <body>
    <form class="login-box">
      <h2>Login</h2>

      <div class="input-group">
        <label>Email</label>
        <input type="text" placeholder="Tên đăng nhập" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Password" />
      </div>
      <button type="submit">Login</button>
      <div class="footer">
        <p>Don't have an account? <a href="#">Sign up</a></p>
      </div>
    </form>
  </body>
</html>
