<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmZ-Xem phim miễn phí</title>
    <link rel="stylesheet" href="mainpage.css">
</head>

<body>
    <ul class="nav-links">
            <li><a href="#" class="active">Trang Chủ</a></li>
            <li><a href="#">Phim Lẻ</a></li>
            <li><a href="#">Phim Bộ</a></li>
            <li><a href="#">Chiếu Rạp</a></li>
            <li><a href="#">Thể Loại</a></li>
        </ul>
    <div class="navbar">
        <div class="navbar-left">
            <button class="menutoggle">
                ☰
            </button>
            <img src="img/logo.jpg" alt="logo" class="logo">
        </div>
        <div class="search">
            <input type="text" id="searchbar" placeholder="Tìm kiếm phim">
            <span class="searchicon">🔍</span>
        </div>
        <div class="login">
            <button class="loginbtn">Đăng nhập</button>
        </div>
    </div>
    <div class="banner">
        <div class="banner-content">
            <div class="banner-tags-top">
                <span class="badge">2D</span>
                <span class="badgeep">EP 1</span>
                <span class="badgemeta">2026 || 2B View</span>
            </div>
            <div class="banner-name">
                <h1>Ten phim</h1>
            </div>
            <div class="banner-genres">
                <span>Hanh dong</span>
                <span>Hanh dong</span>
                <span>Hanh dong</span>
                <span>Hanh dong</span>
            </div>
            <div class="banner-desc">
                <p>Mo ta phim</p>
            </div>
            <div class="banner-btn">
                <button class="playbtn">PLAY</button>
                <button class="savebtn">SAVE</button>
            </div>
        </div>
        <div class="banner-img">
            <img class="bannerimg" src="img/logo.jpg">
        </div>
    </div>
</body>

</html>
